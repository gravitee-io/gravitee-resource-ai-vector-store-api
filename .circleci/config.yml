version: 2.1

# this allows you to use CircleCI's dynamic configuration feature
setup: true

orbs:
  gravitee: gravitee-io/gravitee@5.6.0

parameters:
  release_tag_pattern:
    type: string
    default: "/^[0-9]+\\.[0-9]+\\.[0-9]+(-(alpha|beta|rc)\\.[0-9]+)?$/"

# our single workflow, that triggers the setup job defined above, filters on tag and branches are needed otherwise
# some workflow and job will not be triggered for tags (default CircleCI behavior)
workflows:
  setup_build:
    unless: << pipeline.git.tag >>
    jobs:
      - gravitee/setup_lib-build-config:
          filters:
            tags:
              ignore:
                - /.*/

  setup_release:
    when:
      matches:
        pattern: << pipeline.parameters.release_tag_pattern >>
        value: << pipeline.git.tag >>
    jobs:
      - gravitee/setup_lib-release-config:
          filters:
            branches:
              ignore:
                - /.*/
            tags:
              only:
                - << pipeline.parameters.release_tag_pattern >>
